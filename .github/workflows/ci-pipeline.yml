name: Advanced Parallel Testing & Ship Automation

on:
  push:
    branches: [ "main" ]

jobs:
  # Job 1: Test across multiple parallel environments simultaneously
  matrix-test:
    runs-on: ${{ matrix.os }} # Dynamic cloud runner assignment
    
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-22.04]  # Running on two different Linux variations
        python-version: ["3.9", "3.10"]    # Testing against multiple Python runtimes

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Project Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Execute Local Code Syntax Validation
      run: |
        echo "Running automation sanity checks on ${{ matrix.os }} with Python ${{ matrix.python-version }}..."
        python -m compileall .
