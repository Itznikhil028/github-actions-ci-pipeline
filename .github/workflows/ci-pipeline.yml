name: Production Deployment Ship Automation

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-ship:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # Gives the runner explicit permission to upload images here

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    # Log into GitHub's own Container Registry automatically using the built-in system token
    - name: Authenticate to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}  # Automatically grabs your GitHub username (Itznikhil028)
        password: ${{ secrets.GITHUB_TOKEN }}  # Automatically generated system password

    - name: Build and Push Production Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        # Converts your username to lowercase automatically to prevent registry errors
        tags: ghcr.io/itznikhil028/github-actions-ci-pipeline:latest
